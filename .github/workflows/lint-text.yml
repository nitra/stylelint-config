name: Lint Text

on:
  push:
    branches:
      - dev
    paths:
      - '**/*.js'
      - '**/*.ts'
      - '**/*.vue'
      - '**/*.html'
      - '**/*.css'
      - '**/*.scss'
      - '**/*.less'
      - '**/*.json'
      - '**/*.jsonc'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.toml'
      - '**/*.xml'
      - '**/*.md'
      - '**/*.mdc'
      - '**/*.mdс'
      - '**/*.txt'
      - '**/*.go'
      - '**/*.py'
      - '**/*.php'

  pull_request:
    branches:
      - dev

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  text:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-bun-deps

      - name: Lint text
        run: bun run lint-text
